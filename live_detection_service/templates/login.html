<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Masuk | LPR Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: url("{{ url_for('static', filename='background.jpg') }}") no-repeat center center/cover;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 1;
            display: flex;
            width: 800px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
        }

        .login-left {
            width: 40%;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-left h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-right {
            width: 50%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
        }

        .login-right h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #031d67;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1994e6;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 14px;
            border-radius: 8px;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>
    <div class="login-container">

        <!-- Bahagian Kiri -->
        <div class="login-left">
            <h2>Papan Pemuka LPR</h2>
            <p>Pengecaman Plat Nombor Kenderaan dengan Mudah di Hujung Jari Anda.</p>
        </div>

        <!-- Bahagian Kanan -->
        <div class="login-right">
            <h3>LOG MASUK</h3>
            <form method="POST" action="/login">
                <label>Nama Pengguna</label>
                <input type="text" name="username" placeholder="Masukkan Nama Pengguna" required>

                <label>Kata Laluan</label>
                <input type="password" name="password" placeholder="Masukkan Kata Laluan" required>

                <button type="submit">LOG MASUK</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2025 Vista Summerose
    </div>
</body>

</html>
